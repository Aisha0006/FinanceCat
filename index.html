<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceFlow — Личный бюджет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .transaction-item:hover { transform: translateX(5px); }
        #transactions-list::-webkit-scrollbar { width: 4px; }
        #transactions-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .profile-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #6366f1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="wallet" class="text-indigo-600"></i> FinanceFlow
                </h1>
                <p class="text-slate-500">Управляйте своими деньгами с умом</p>
            </div>
            <div class="text-right hidden md:block">
                <p class="text-sm text-slate-400">Сегодня</p>
                <p id="current-date" class="font-medium text-slate-700"></p>
            </div>
             <!-- Блок профиля админа -->
            <div class="flex items-center gap-4 bg-white p-2 pr-4 rounded-full shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer" onclick="editProfile()">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] text-slate-400 uppercase font-bold leading-none mb-1">Пользователь</p>
                    <p id="admin-name" class="text-sm font-semibold text-slate-700 leading-none">Имя Фамилия</p>
                </div>
                <img id="admin-photo" src="https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff" alt="Admin" class="profile-avatar">
            </div>
        </header>
        <!-- Модальное окно редактирования профиля (скрыто по умолчанию) -->
        <div id="profile-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                <h3 class="text-xl font-bold text-slate-800 mb-4">Настройки профиля</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">ИМЯ И ФАМИЛИЯ</label>
                        <input type="text" id="input-admin-name" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">URL ФОТО (необязательно)</label>
                        <input type="text" id="input-admin-photo" placeholder="https://..." class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button onclick="saveProfile()" class="flex-1 bg-indigo-600 text-white py-2 rounded-xl font-bold hover:bg-indigo-700">Сохранить</button>
                        <button onclick="closeProfileModal()" class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-xl font-bold hover:bg-slate-200">Отмена</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-xl shadow-indigo-200">
                    <p class="text-indigo-100 text-sm font-medium opacity-80 uppercase tracking-wider">Текущий Баланс</p>
                    <h2 class="text-4xl font-bold mt-1" id="total-balance">0 ⃀</h2>
                    <div class="flex mt-6 gap-4">
                        <div class="flex-1 bg-white/10 rounded-2xl p-3">
                            <p class="text-[10px] text-indigo-200 uppercase">Доходы</p>
                            <p class="font-semibold text-emerald-300" id="total-income">+0 ⃀</p>
                        </div>
                        <div class="flex-1 bg-white/10 rounded-2xl p-3">
                            <p class="text-[10px] text-indigo-200 uppercase">Расходы</p>
                            <p class="font-semibold text-rose-300" id="total-expenses">-0 ⃀</p>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200">
                    <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> Новая операция
                    </h3>
                    <form id="finance-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">ОПИСАНИЕ</label>
                            <input type="text" id="desc" required placeholder="Напр. Продукты или Зарплата" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">СУММА</label>
                            <input type="number" id="amount" step="0.01" required placeholder="0.00" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">ТИП</label>
                            <div class="grid grid-cols-2 gap-2">
                                <button type="button" onclick="setType('income')" id="btn-income" 
                                    class="py-2 rounded-xl border-2 border-emerald-500 text-emerald-600 font-medium bg-emerald-50 transition-all">Доход</button>
                                <button type="button" onclick="setType('expense')" id="btn-expense" 
                                    class="py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium hover:bg-rose-50 hover:text-rose-600 transition-all">Расход</button>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200 mt-2">
                            Добавить запись
                        </button>
                    </form>
                </div>
            </div>
            <!-- Правая колонка -->
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row items-center gap-8">
                    <div class="w-48 h-48 relative">
                        <canvas id="financeChart"></canvas>
                    </div>
                    <div class="flex-1 w-full">
                        <h3 class="text-xl font-bold text-slate-800 mb-2">Аналитика</h3>
                        <p class="text-slate-500 text-sm mb-4">Распределение финансов за всё время.</p>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center text-sm">
                                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> Доходы</span>
                                <span class="font-bold text-slate-700" id="chart-income-label">0%</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-rose-500"></span> Расходы</span>
                                <span class="font-bold text-slate-700" id="chart-expense-label">0%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-slate-800">История операций</h3>
                        <button onclick="clearHistory()" class="text-xs text-rose-500 hover:underline font-medium">Очистить всё</button>
                    </div>
                    <div id="transactions-list" class="space-y-3 overflow-y-auto max-h-[400px] pr-2">
                        <p class="text-center text-slate-400 py-10">Тут пока пусто...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация иконок
        lucide.createIcons();

        // Состояние приложения
        let currentType = 'income';
        let transactions = JSON.parse(localStorage.getItem('ff_data')) || [];
        let profile = JSON.parse(localStorage.getItem('ff_profile')) || { name: 'Алексей Иванов', photo: '' };
        let financeChart;

        
        // Дата в шапке
        const todayStr = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('current-date').innerText = "Сегодня: " + todayStr;
        // Функции профиля
        function loadProfile() {
            document.getElementById('admin-name').innerText = profile.name;
            if (profile.photo) {
                document.getElementById('admin-photo').src = profile.photo;
            } else {
                document.getElementById('admin-photo').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=6366f1&color=fff`;
            }
        }

        function editProfile() {
            document.getElementById('input-admin-name').value = profile.name;
            document.getElementById('input-admin-photo').value = profile.photo;
            document.getElementById('profile-modal').classList.remove('hidden');
        }

        function closeProfileModal() {
            document.getElementById('profile-modal').classList.add('hidden');
        }

        function saveProfile() {
            const newName = document.getElementById('input-admin-name').value.trim();
            const newPhoto = document.getElementById('input-admin-photo').value.trim();
            
            if (newName) {
                profile.name = newName;
                profile.photo = newPhoto;
                localStorage.setItem('ff_profile', JSON.stringify(profile));
                loadProfile();
                closeProfileModal();
            }
        }
        // Переключение типа (Доход/Расход)
        function setType(type) {
            currentType = type;
            const bInc = document.getElementById('btn-income');
            const bExp = document.getElementById('btn-expense');
            if (type === 'income') {
                bInc.className = "py-2 rounded-xl border-2 border-emerald-500 text-emerald-600 font-medium bg-emerald-50 transition-all";
                bExp.className = "py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium hover:bg-rose-50 hover:text-rose-600 transition-all";
            } else {
                bInc.className = "py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium hover:bg-emerald-50 hover:text-emerald-600 transition-all";
                bExp.className = "py-2 rounded-xl border-2 border-rose-500 text-rose-600 font-medium bg-rose-50 transition-all";
            }
        }
        // Рендеринг интерфейса
        function renderUI() {
            const list = document.getElementById('transactions-list');
            list.innerHTML = '';
            
            if (transactions.length === 0) {
                list.innerHTML = '<p class="text-center text-slate-400 py-10">Нет данных для отображения</p>';
                updateChart(0, 0);
                updateTotals(0, 0);
                return;
            }

            let incTotal = 0;
            let expTotal = 0;
            // Сортируем: новые сверху
            const sortedTransactions = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));   

            sortedTransactions.forEach(t => {
                const amt = parseFloat(t.amount);
                if (t.type === 'income') incTotal += amt; else expTotal += amt;

                const item = document.createElement('div');
                item.className = "transaction-item group flex items-center justify-between p-4 rounded-2xl bg-slate-50 hover:bg-white hover:shadow-md transition-all duration-300 border border-transparent hover:border-slate-100";       
                const icon = t.type === 'income' ? 'arrow-up-right' : 'arrow-down-left';
                const colorClass = t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600';

                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="p-3 rounded-xl ${colorClass}">
                            <i data-lucide="${icon}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800">${t.description}</p>
                            <p class="text-xs text-slate-400">${new Date(t.date).toLocaleDateString()}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right font-bold ${t.type === 'income' ? 'text-emerald-600' : 'text-slate-800'}">
                            ${t.type === 'income' ? '+' : '-'}${amt.toLocaleString()} ⃀
                        </div>
                        <button onclick="deleteTransaction(${t.id})" class="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-rose-500 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                list.appendChild(item);
            });

            updateTotals(incTotal, expTotal);
            updateChart(incTotal, expTotal);
            lucide.createIcons();
        }

        function updateTotals(inc, exp) {
            const total = inc - exp;
            document.getElementById('total-balance').innerText = `${total.toLocaleString()} ⃀`;
            document.getElementById('total-income').innerText = `+${inc.toLocaleString()} ⃀`;
            document.getElementById('total-expenses').innerText = `-${exp.toLocaleString()} ⃀`;
        }

        function updateChart(inc, exp) {
            const total = inc + exp;
            const incPerc = total === 0 ? 0 : Math.round((inc / total) * 100);
            const expPerc = total === 0 ? 0 : Math.round((exp / total) * 100);

            document.getElementById('chart-income-label').innerText = incPerc + '%';
            document.getElementById('chart-expense-label').innerText = expPerc + '%';

            const ctx = document.getElementById('financeChart').getContext('2d');
            if (financeChart) financeChart.destroy();

            financeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [inc || 1, exp || (inc === 0 && exp === 0 ? 0 : 0)], // Заглушка если пусто
                        backgroundColor: [inc === 0 && exp === 0 ? '#e2e8f0' : '#10b981', '#f43f5e'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    cutout: '80%',
                    plugins: { legend: { display: false }, tooltip: { enabled: total > 0 } },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        // Обработка формы
        document.getElementById('finance-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const descInput = document.getElementById('desc');
            const amountInput = document.getElementById('amount');

            const newTransaction = {
                id: Date.now(),
                description: descInput.value,
                amount: parseFloat(amountInput.value),
                type: currentType,
                date: new Date().toISOString()
            };

            transactions.push(newTransaction);
            localStorage.setItem('ff_data', JSON.stringify(transactions));
            descInput.value = '';
            amountInput.value = '';
            renderUI();
        });
        // Удаление данных
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('ff_data', JSON.stringify(transactions));
            renderUI();
        }

        // Очистка данных
        function clearHistory() {
            if(confirm('Вы уверены, что хотите удалить все записи?')) {
                transactions = [];
                localStorage.removeItem('ff_data');
                renderUI();
            }
        }

        // Первоначальный запуск
        loadProfile();
        renderUI();
    </script>
</body>
</html>
