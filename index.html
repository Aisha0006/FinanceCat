</html>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceCat — Личный бюджет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .transaction-item:hover { transform: translateX(5px); }
        #transactions-list::-webkit-scrollbar { width: 4px; }
        #transactions-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .profile-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid #6366f1; background: #fff; }
        
        .filter-btn.active {
            background-color: #6366f1;
            color: white;
            box-shadow: 0 4px 6px -1px rgb(99 102 241 / 0.2);
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-2">
                    <img src="кот.png" class="text-4xl w-7" /> FinanceCat
                </h1>
                <p class="text-slate-500 text-sm">Управляйте своими деньгами с умом</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden md:block mr-2">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Сегодня</p>
                    <p id="current-date" class="font-medium text-slate-700"></p>
                </div>
                <button onclick="editProfile()" class="flex items-center gap-3 bg-white p-1.5 pr-4 rounded-full shadow-sm border border-slate-100 hover:shadow-md transition-all active:scale-95">
                  <div class="text-left hidden sm:block">
                      <p id="admin-name" class="text-xs font-bold text-slate-700 leading-none">Загрузка...</p>
                      <!-- <p class="text-[9px] text-indigo-500 font-bold mt-1 uppercase tracking-tighter">Настройки</p> -->
                  </div>  
                  <img id="admin-photo" src="" alt="Profile" class="profile-avatar">
                </button>
            </div>
        </header>

        <div id="profile-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
            <div class="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl">
                <div class="text-center mb-6">
                    <div class="relative inline-block">
                        <img id="modal-preview-photo" src="" class="w-24 h-24 rounded-full object-cover border-4 border-indigo-50 mx-auto shadow-sm">
                        <label for="upload-photo" class="absolute bottom-0 right-0 bg-indigo-600 text-white p-2 rounded-full cursor-pointer hover:bg-indigo-700 shadow-lg transition-all">
                            <i data-lucide="camera" class="w-4 h-4"></i>
                            <input type="file" id="upload-photo" class="hidden" accept="image/*" onchange="previewImage(this)">
                        </label>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mt-4">Ваш профиль</h3>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">Ваше имя</label>
                        <input type="text" id="input-admin-name" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button onclick="saveProfile()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all">Сохранить</button>
                        <button onclick="closeProfileModal()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-all">Отмена</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-indigo-600 rounded-3xl p-6 text-white shadow-xl shadow-indigo-200">
                    <p class="text-indigo-100 text-sm font-medium opacity-80 uppercase tracking-wider">Общий Баланс</p>
                    <h2 class="text-4xl font-bold mt-1" id="total-balance">0⃀</h2>
                    <div class="flex mt-6 gap-4">
                        <div class="flex-1 bg-white/10 rounded-2xl p-3">
                            <p class="text-[10px] text-indigo-200 uppercase font-bold">Доходы</p>
                            <p class="font-semibold text-emerald-300" id="total-income">+0⃀</p>
                        </div>
                        <div class="flex-1 bg-white/10 rounded-2xl p-3">
                            <p class="text-[10px] text-indigo-200 uppercase font-bold">Расходы</p>
                            <p class="font-semibold text-rose-300" id="total-expenses">-0⃀</p>
                        </div>
                    </div>
                </div>

                <div
            class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200"
          >
            <h3
              class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"
            >
              <i data-lucide="plus-circle" class="w-5 h-5"></i> Новая операция
            </h3>
            <form id="finance-form" class="space-y-4">
              <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1"
                  >ОПИСАНИЕ</label
                >
                <input
                  type="text"
                  id="desc"
                  required
                  placeholder="Напр. Продукты"
                  class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                />
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs font-semibold text-slate-500 mb-1"
                    >СУММА</label
                  >
                  <input
                    type="number"
                    id="amount"
                    step="0.01"
                    required
                    placeholder="0.00"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                  />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-500 mb-1"
                    >ДАТА</label
                  >
                  <input
                    type="date"
                    id="op-date"
                    required
                    class="w-full px-2 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                  />
                </div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1"
                  >ТИП</label
                >
                <div class="grid grid-cols-2 gap-2">
                  <button
                    type="button"
                    onclick="setType('income')"
                    id="btn-income"
                    class="py-2 rounded-xl border-2 border-emerald-500 text-emerald-600 font-medium bg-emerald-50 transition-all"
                  >
                    Доход
                  </button>
                  <button
                    type="button"
                    onclick="setType('expense')"
                    id="btn-expense"
                    class="py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium hover:bg-rose-50 hover:text-rose-600 transition-all"
                  >
                    Расход
                  </button>
                </div>
              </div>
              <button
                type="submit"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200 mt-2"
              >
                Добавить запись
              </button>
            </form>
          </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row items-center gap-8">
                    <div class="w-48 h-48 relative"><canvas id="financeChart"></canvas></div>
                    <div class="flex-1 w-full">
                        <h3 class="text-xl font-bold text-slate-800 mb-2">Аналитика</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between text-sm"><span>Доходы</span><span class="font-bold" id="chart-income-label">0%</span></div>
                            <div class="flex justify-between text-sm"><span>Расходы</span><span class="font-bold" id="chart-expense-label">0%</span></div>
                        </div>
                    </div>
                </div>

            <!-- История -->
            <div class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold text-slate-800">История операций</h3>
                <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 mb-6" >
                    <div class="flex flex-wrap items-center gap-2 w-full xl:w-auto">
                        <!-- Группа кнопок фильтров -->
                        <div class="flex bg-slate-100 p-1 rounded-xl flex-grow sm:flex-grow-0" >
                            <button onclick="changeFilter('all')" data-filter="all" class="filter-btn active text-[10px] md:text-xs px-3 py-1.5 rounded-lg font-bold transition-all uppercase" > Все</button>
                            <button onclick="changeFilter('day')" data-filter="day" class="filter-btn text-[10px] md:text-xs px-3 py-1.5 rounded-lg font-bold text-slate-500 hover:text-slate-800 transition-all uppercase">Сегодня</button>
                            <button onclick="changeFilter('week')" data-filter="week" class="filter-btn text-[10px] md:text-xs px-3 py-1.5 rounded-lg font-bold text-slate-500 hover:text-slate-800 transition-all uppercase">7 дней</button>
                        </div>

                        <!-- Выбор конкретной даты для фильтрации -->
                        <div class="relative flex items-center bg-slate-100 p-1 rounded-xl group">
                            <span class="pl-2 pr-1 text-[10px] font-bold text-slate-400 uppercase hidden sm:inline">Выбор даты:</span>
                            <input type="date" id="filter-specific-date" onchange="changeFilter('custom')" class="bg-white border border-slate-200 text-xs font-bold text-slate-700 rounded-lg px-2 py-1 outline-none focus:ring-1 focus:ring-indigo-500"/>
                            </div>

                            <div class="flex items-center gap-2">
                                <button onclick="toggleSort()" class="flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-all font-semibold h-8 overflow-hidden group">
                                    <i data-lucide="arrow-up-down" class="w-4 h-4"></i>
                                    <span class="w-0 opacity-0 group-hover:w-auto group-hover:opacity-100 transition-all duration-300 text-xs whitespace-nowrap">Сортировка</span>
                                </button>

                                <button onclick="clearHistory()" class="flex items-center gap-2 text-rose-500 hover:text-rose-600 transition-all font-semibold h-8 overflow-hidden group">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    <span class="w-0 opacity-0 group-hover:w-auto group-hover:opacity-100 transition-all duration-300 text-xs whitespace-nowrap">Очистить всё</span>
                                </button>
                        </div>
                    </div>
                    </div>
                        <div id="transactions-list" class="space-y-1 overflow-y-auto max-h-[430px] pr-1"><!-- Список транзакций --></div>
                    </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentType = 'income';
        let currentFilter = 'all';
        let transactions = JSON.parse(localStorage.getItem('ff_data')) || [];
        let profile = JSON.parse(localStorage.getItem('ff_profile')) || { name: 'Пользователь', photo: '' };
        let tempPhotoBase64 = ''; // Для временного хранения превью
        let financeChart;
        let sortOrder = 'desc'; // 'desc' — новые сначала, 'asc' — старые сначала

        // Инициализация дат
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('op-date').value = today;
        document.getElementById('filter-specific-date').value = today;
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

        // --- ЛОГИКА ПРОФИЛЯ ---
        function loadProfile() {
            document.getElementById('admin-name').innerText = profile.name;
            const photoSrc = profile.photo || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=6366f1&color=fff`;
            document.getElementById('admin-photo').src = photoSrc;
            document.getElementById('modal-preview-photo').src = photoSrc;
        }

        function editProfile() {
            document.getElementById('input-admin-name').value = profile.name;
            tempPhotoBase64 = profile.photo; // Сбрасываем временное фото на текущее
            loadProfile();
            document.getElementById('profile-modal').classList.remove('hidden');
        }

        function closeProfileModal() {
            document.getElementById('profile-modal').classList.add('hidden');
        }

        // Превью изображения при выборе файла
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    tempPhotoBase64 = e.target.result; // Сохраняем строку Base64
                    document.getElementById('modal-preview-photo').src = tempPhotoBase64;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveProfile() {
            const newName = document.getElementById('input-admin-name').value.trim();
            if (newName) {
                profile.name = newName;
                profile.photo = tempPhotoBase64; // Сохраняем новое фото
                localStorage.setItem('ff_profile', JSON.stringify(profile));
                loadProfile();
                closeProfileModal();
            }
        }

        // --- ОСТАЛЬНАЯ ЛОГИКА (Фильтры, Рендер, Графики) ---
        function setType(type) {
            currentType = type;
            document.getElementById('btn-income').className = type === 'income' ? "py-2 rounded-xl border-2 border-emerald-500 text-emerald-600 font-medium bg-emerald-50" : "py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium";
            document.getElementById('btn-expense').className = type === 'expense' ? "py-2 rounded-xl border-2 border-rose-500 text-rose-600 font-medium bg-rose-50" : "py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium";
        }

        function changeFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
            renderUI();
        }

        function renderUI() {
            const list = document.getElementById('transactions-list');
            list.innerHTML = '';

            // 1. Сначала фильтруем данные один раз
            const filtered = transactions.filter(t => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'day') return t.date === today;
                if (currentFilter === 'custom') {
                    const selected = document.getElementById('filter-specific-date').value;
                    return t.date === selected;
                }
                if (currentFilter === 'week') {
                    const transDate = new Date(t.date);
                    const sevenDaysAgo = new Date();
                    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                    return transDate >= sevenDaysAgo;
                }
                return true;
            });

            // 2. Считаем баланс (по ВСЕМ транзакциям, а не только по отфильтрованным)
            let inc = 0, exp = 0;
            transactions.forEach(t => t.type === 'income' ? inc += t.amount : exp += t.amount);
            document.getElementById('total-balance').innerText = (inc - exp).toLocaleString() + ' ⃀';
            document.getElementById('total-income').innerText = '+' + inc.toLocaleString() + ' ⃀';
            document.getElementById('total-expenses').innerText = '-' + exp.toLocaleString() + ' ⃀';

            // 3. Сортируем уже отфильтрованный список
            filtered.sort((a, b) => {
                const dateA = new Date(a.id);
                const dateB = new Date(b.id);
                return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
            });

            // 4. Отрисовываем
            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-center text-slate-400 py-10">Нет записей</p>';
            } else {
                filtered.forEach(t => {
                    const item = document.createElement('div');
                    const dateParts = t.date.split('-');
                    const formattedDate = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}`;
                    
                    item.className = "flex items-center justify-between p-4 rounded-2xl bg-slate-50 border border-transparent hover:border-slate-100 transition-all";
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="p-2 rounded-lg ${t.type === 'income' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                <i data-lucide="${t.type === 'income' ? 'trending-up' : 'trending-down'}" class="w-4 h-4"></i>
                            </div>
                            <div>
                                <p class="font-bold text-slate-800 text-sm">${t.description}</p>
                                <p class="text-[10px] text-slate-400">${formattedDate}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 font-bold ${t.type === 'income' ? 'text-emerald-600' : 'text-slate-700'}">
                            ${t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()} ⃀
                            <button onclick="deleteTransaction(${t.id})" class="text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            }
            
            updateChart(filtered);
            lucide.createIcons();
        }

        function toggleSort() {
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            renderUI(); // Перерисовываем список с новой сортировкой
        }
        function updateChart(data) {
            let fInc = 0, fExp = 0;
            data.forEach(t => t.type === 'income' ? fInc += t.amount : fExp += t.amount);
            const total = fInc + fExp;
            document.getElementById('chart-income-label').innerText = total ? Math.round(fInc/total*100)+'%' : '0%';
            document.getElementById('chart-expense-label').innerText = total ? Math.round(fExp/total*100)+'%' : '0%';

            const ctx = document.getElementById('financeChart').getContext('2d');
            if (financeChart) financeChart.destroy();
            financeChart = new Chart(ctx, {
                type: 'doughnut',
                data: { datasets: [{ data: total ? [fInc, fExp] : [1], backgroundColor: total ? ['#10b981', '#f43f5e'] : ['#f1f5f9'], borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
            });
        }

        document.getElementById('finance-form').addEventListener('submit', (e) => {
            e.preventDefault();
            transactions.push({
                id: Date.now(),
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amount').value),
                type: currentType,
                date: document.getElementById('op-date').value
            });
            localStorage.setItem('ff_data', JSON.stringify(transactions));
            e.target.reset();
            document.getElementById('op-date').value = today;
            renderUI();
        });

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('ff_data', JSON.stringify(transactions));
            renderUI();
        }
        function clearHistory() {
            if (confirm('Вы уверены, что хотите удалить все операции?')) {
                transactions = [];
                localStorage.removeItem('ff_data');
                renderUI();
            }
        }
        loadProfile();
        renderUI();
    </script>
</body>
</html>
