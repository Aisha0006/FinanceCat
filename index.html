<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanceCat — Личный бюджет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .transaction-item:hover {
        transform: translateX(3px);
      }
      #transactions-list::-webkit-scrollbar {
        width: 4px;
      }
      #transactions-list::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .profile-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #6366f1;
      }

      .filter-btn.active {
        background-color: #6366f1;
        color: white;
        box-shadow: 0 4px 6px -1px rgb(99 102 241 / 0.2);
      }

      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        filter: invert(0.4);
      }
    </style>
  </head>
  <body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
      <header class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-3xl font-bold text-slate-800 flex gap-2">
            <!-- <i data-lucide="wallet" class="text-indigo-600"></i>  -->
            <img src="кот.png" class="text-4xl w-7" />FinanceCat
          </h1>
          <p class="text-slate-500 text-sm">
            Управляйте своими деньгами с умом
          </p>
        </div>
        <div class="flex items-center gap-4">
          <div class="text-right hidden md:block mr-2">
            <p
              class="text-[10px] text-slate-400 uppercase font-bold tracking-wider"
            >
              Сегодня
            </p>
            <p id="current-date" class="font-medium text-slate-700"></p>
          </div>
          <div
            class="flex items-center gap-4 bg-white p-2 pr-4 rounded-full shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer"
            onclick="editProfile()"
          >
            <div class="text-right hidden sm:block">
              <p
                id="admin-name"
                class="text-sm font-semibold text-slate-700 leading-none"
              >
                Имя Фамилия
              </p>
            </div>
            <img
              id="admin-photo"
              src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff"
              alt="Admin"
              class="profile-avatar"
            />
          </div>
        </div>
      </header>

      <!-- Модальное окно профиля -->
      <div
        id="profile-modal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4"
      >
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
          <h3 class="text-xl font-bold text-slate-800 mb-4">
            Настройки профиля
          </h3>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-bold text-slate-400 mb-1"
                >ИМЯ И ФАМИЛИЯ</label
              >
              <input
                type="text"
                id="input-admin-name"
                class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"
              />
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-400 mb-1"
                >URL ФОТО</label
              >
              <input
                type="text"
                id="input-admin-photo"
                placeholder="https://..."
                class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500"
              />
            </div>
            <div class="flex gap-2 pt-2">
              <button
                onclick="saveProfile()"
                class="flex-1 bg-indigo-600 text-white py-2 rounded-xl font-bold hover:bg-indigo-700"
              >
                Сохранить
              </button>
              <button
                onclick="closeProfileModal()"
                class="flex-1 bg-slate-100 text-slate-600 py-2 rounded-xl font-bold hover:bg-slate-200"
              >
                Отмена
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 space-y-6">
          <!-- Карточка баланса -->
          <div
            class="bg-indigo-600 rounded-3xl p-6 text-white shadow-xl shadow-indigo-200"
          >
            <p
              class="text-indigo-100 text-sm font-medium opacity-80 uppercase tracking-wider"
            >
              Общий Баланс
            </p>
            <h2 class="text-4xl font-bold mt-1" id="total-balance">0 ⃀</h2>
            <div class="flex mt-6 gap-4">
              <div class="flex-1 bg-white/10 rounded-2xl p-3">
                <p class="text-[10px] text-indigo-200 uppercase font-bold">
                  Доходы
                </p>
                <p class="font-semibold text-emerald-300" id="total-income">
                  +0 ⃀
                </p>
              </div>
              <div class="flex-1 bg-white/10 rounded-2xl p-3">
                <p class="text-[10px] text-indigo-200 uppercase font-bold">
                  Расходы
                </p>
                <p class="font-semibold text-rose-300" id="total-expenses">
                  -0 ⃀
                </p>
              </div>
            </div>
          </div>

          <!-- Форма добавления -->
          <div
            class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200"
          >
            <h3
              class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"
            >
              <i data-lucide="plus-circle" class="w-5 h-5"></i> Новая операция
            </h3>
            <form id="finance-form" class="space-y-4">
              <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1"
                  >ОПИСАНИЕ</label
                >
                <input
                  type="text"
                  id="desc"
                  required
                  placeholder="Напр. Продукты"
                  class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                />
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs font-semibold text-slate-500 mb-1"
                    >СУММА</label
                  >
                  <input
                    type="number"
                    id="amount"
                    step="0.01"
                    required
                    placeholder="0.00"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                  />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-500 mb-1"
                    >ДАТА</label
                  >
                  <input
                    type="date"
                    id="op-date"
                    required
                    class="w-full px-2 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                  />
                </div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1"
                  >ТИП</label
                >
                <div class="grid grid-cols-2 gap-2">
                  <button
                    type="button"
                    onclick="setType('income')"
                    id="btn-income"
                    class="py-2 rounded-xl border-2 border-emerald-500 text-emerald-600 font-medium bg-emerald-50 transition-all"
                  >
                    Доход
                  </button>
                  <button
                    type="button"
                    onclick="setType('expense')"
                    id="btn-expense"
                    class="py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium hover:bg-rose-50 hover:text-rose-600 transition-all"
                  >
                    Расход
                  </button>
                </div>
              </div>
              <button
                type="submit"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200 mt-2"
              >
                Добавить запись
              </button>
            </form>
          </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
          <!-- Аналитика -->
          <div
            class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200 flex flex-col md:flex-row items-center gap-8"
          >
            <div class="w-48 h-48 relative">
              <canvas id="financeChart"></canvas>
            </div>
            <div class="flex-1 w-full">
              <h3 class="text-xl font-bold text-slate-800 mb-2">
                Аналитика периода
              </h3>
              <p class="text-slate-500 text-sm mb-4">
                Распределение средств за выбранный фильтр.
              </p>
              <div class="space-y-3">
                <div class="flex justify-between items-center text-sm">
                  <span class="flex items-center gap-2"
                    ><span class="w-3 h-3 rounded-full bg-emerald-500"></span>
                    Доходы</span
                  >
                  <span class="font-bold text-slate-700" id="chart-income-label"
                    >0%</span
                  >
                </div>
                <div class="flex justify-between items-center text-sm">
                  <span class="flex items-center gap-2"
                    ><span class="w-3 h-3 rounded-full bg-rose-500"></span>
                    Расходы</span
                  >
                  <span
                    class="font-bold text-slate-700"
                    id="chart-expense-label"
                    >0%</span
                  >
                </div>
              </div>
            </div>
          </div>

          <!-- История -->
          <div
            class="glass-card rounded-3xl p-6 shadow-sm border border-slate-200"
          >
            <h3 class="text-lg font-bold text-slate-800">История операций</h3>
            <div
              class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 mb-6"
            >
              <div class="flex flex-wrap items-center gap-2 w-full xl:w-auto">
                <!-- Группа кнопок фильтров -->
                <div
                  class="flex bg-slate-100 p-1 rounded-xl flex-grow sm:flex-grow-0"
                >
                  <button
                    onclick="changeFilter('all')"
                    data-filter="all"
                    class="filter-btn active text-[10px] md:text-xs px-3 py-1.5 rounded-lg font-bold transition-all uppercase"
                  >
                    Все
                  </button>
                  <button
                    onclick="changeFilter('day')"
                    data-filter="day"
                    class="filter-btn text-[10px] md:text-xs px-3 py-1.5 rounded-lg font-bold text-slate-500 hover:text-slate-800 transition-all uppercase"
                  >
                    Сегодня
                  </button>
                  <button
                    onclick="changeFilter('week')"
                    data-filter="week"
                    class="filter-btn text-[10px] md:text-xs px-3 py-1.5 rounded-lg font-bold text-slate-500 hover:text-slate-800 transition-all uppercase"
                  >
                    7 дней
                  </button>
                </div>

                <!-- Выбор конкретной даты для фильтрации -->
                <div
                  class="relative flex items-center bg-slate-100 p-1 rounded-xl group"
                >
                  <span
                    class="pl-2 pr-1 text-[10px] font-bold text-slate-400 uppercase hidden sm:inline"
                    >Выбор даты:</span
                  >
                  <input
                    type="date"
                    id="filter-specific-date"
                    onchange="changeFilter('custom')"
                    class="bg-white border border-slate-200 text-xs font-bold text-slate-700 rounded-lg px-2 py-1 outline-none focus:ring-1 focus:ring-indigo-500"
                  />
                </div>

                <div
                   class="relative flex items-center p-1 rounded-xl group justify-end"
                >
                  <button
                    onclick="clearHistory()"
                    class="flex items-center gap-1 text-xs text-rose-500 hover:text-rose-600 transition-colors font-semibold"
                  >
                    <i data-lucide="trash-2" class="w-3 h-3"></i> Очистить всё
                  </button>
                </div>
              </div>
            </div>

            <div
              id="transactions-list"
              class="space-y-1 overflow-y-auto max-h-[430px] pr-1"
            >
              <!-- Список транзакций -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Инициализация иконок
      lucide.createIcons();

      // Состояние
      let currentType = "income";
      let currentFilter = "all"; // 'all', 'day', 'week', 'month', 'year', 'custom'
      let transactions = JSON.parse(localStorage.getItem("ff_data")) || [];
      let profile = JSON.parse(localStorage.getItem("ff_profile")) || {
        name: "Алексей Иванов",
        photo: "",
      };
      let financeChart;

      // Установка даты сегодня по умолчанию
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      const formattedToday = `${yyyy}-${mm}-${dd}`;

      document.getElementById("op-date").value = formattedToday;
      document.getElementById("filter-specific-date").value = formattedToday;
      document.getElementById("current-date").innerText =
        today.toLocaleDateString("ru-RU", {
          day: "numeric",
          month: "long",
          year: "numeric",
        });

      function loadProfile() {
        document.getElementById("admin-name").innerText = profile.name;
        const photoImg = document.getElementById("admin-photo");
        photoImg.src =
          profile.photo ||
          `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.name)}&background=6366f1&color=fff`;
      }

      function editProfile() {
        document.getElementById("input-admin-name").value = profile.name;
        document.getElementById("input-admin-photo").value = profile.photo;
        document.getElementById("profile-modal").classList.remove("hidden");
      }

      function closeProfileModal() {
        document.getElementById("profile-modal").classList.add("hidden");
      }

      function saveProfile() {
        const newName = document
          .getElementById("input-admin-name")
          .value.trim();
        const newPhoto = document
          .getElementById("input-admin-photo")
          .value.trim();
        if (newName) {
          profile.name = newName;
          profile.photo = newPhoto;
          localStorage.setItem("ff_profile", JSON.stringify(profile));
          loadProfile();
          closeProfileModal();
        }
      }

      function setType(type) {
        currentType = type;
        const bInc = document.getElementById("btn-income");
        const bExp = document.getElementById("btn-expense");
        if (type === "income") {
          bInc.className =
            "py-2 rounded-xl border-2 border-emerald-500 text-emerald-600 font-medium bg-emerald-50 transition-all";
          bExp.className =
            "py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium hover:bg-rose-50 hover:text-rose-600 transition-all";
        } else {
          bInc.className =
            "py-2 rounded-xl border-2 border-slate-100 text-slate-400 font-medium hover:bg-emerald-50 hover:text-emerald-600 transition-all";
          bExp.className =
            "py-2 rounded-xl border-2 border-rose-500 text-rose-600 font-medium bg-rose-50 transition-all";
        }
      }

      function changeFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll(".filter-btn").forEach((btn) => {
          if (btn.dataset.filter === filter) {
            btn.classList.add("active");
            btn.classList.remove("text-slate-500");
          } else {
            btn.classList.remove("active");
            btn.classList.add("text-slate-500");
          }
        });
        renderUI();
      }

      function getFilteredTransactions() {
        const now = new Date();
        now.setHours(0, 0, 0, 0);

        return transactions.filter((t) => {
          const tDate = new Date(t.date);
          tDate.setHours(0, 0, 0, 0);

          if (currentFilter === "all") return true;

          if (currentFilter === "day") {
            return tDate.getTime() === now.getTime();
          }

          if (currentFilter === "week") {
            const weekAgo = new Date();
            weekAgo.setDate(now.getDate() - 7);
            return tDate >= weekAgo && tDate <= now;
          }

          if (currentFilter === "custom") {
            const selectedDate = new Date(
              document.getElementById("filter-specific-date").value,
            );
            selectedDate.setHours(0, 0, 0, 0);
            return tDate.getTime() === selectedDate.getTime();
          }

          return true;
        });
      }

      function renderUI() {
        const list = document.getElementById("transactions-list");
        list.innerHTML = "";

        const filteredData = getFilteredTransactions();

        // Расчет общего баланса (по всем данным)
        let totalInc = 0;
        let totalExp = 0;
        transactions.forEach((t) => {
          if (t.type === "income") totalInc += t.amount;
          else totalExp += t.amount;
        });
        updateTotals(totalInc, totalExp);

        // Фильтрованные данные
        let fInc = 0;
        let fExp = 0;

        if (filteredData.length === 0) {
          list.innerHTML = `
                    <div class="text-center py-12">
                        <i data-lucide="search-x" class="w-12 h-12 text-slate-200 mx-auto mb-2"></i>
                        <p class="text-slate-400">Ничего не найдено за этот период</p>
                    </div>`;
          updateChart(0, 0);
          lucide.createIcons();
          return;
        }

        const sorted = [...filteredData].sort(
          (a, b) => new Date(b.date) - new Date(a.date),
        );

        sorted.forEach((t) => {
          if (t.type === "income") fInc += t.amount;
          else fExp += t.amount;

          const item = document.createElement("div");
          item.className =
            "transaction-item group flex items-center justify-between p-4 rounded-2xl bg-slate-50 hover:bg-white hover:shadow-md transition-all duration-300 border border-transparent hover:border-slate-100";

          const icon =
            t.type === "income" ? "arrow-up-right" : "arrow-down-left";
          const colorClass =
            t.type === "income"
              ? "bg-emerald-100 text-emerald-600"
              : "bg-rose-100 text-rose-600";

          item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="p-3 rounded-xl ${colorClass}">
                            <i data-lucide="${icon}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800 line-clamp-1">${t.description}</p>
                            <p class="text-[10px] text-slate-400 uppercase tracking-tight font-medium">${new Date(t.date).toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" })}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right font-bold ${t.type === "income" ? "text-emerald-600" : "text-slate-800"}">
                            ${t.type === "income" ? "+" : "-"}${t.amount.toLocaleString()} ⃀
                        </div>
                        <button onclick="deleteTransaction(${t.id})" class="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-rose-500 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
          list.appendChild(item);
        });

        updateChart(fInc, fExp);
        lucide.createIcons();
      }

      function updateTotals(inc, exp) {
        const total = inc - exp;
        document.getElementById("total-balance").innerText =
          `${total.toLocaleString()} ⃀`;
        document.getElementById("total-income").innerText =
          `+${inc.toLocaleString()} ⃀`;
        document.getElementById("total-expenses").innerText =
          `-${exp.toLocaleString()} ⃀`;
      }

      function updateChart(inc, exp) {
        const total = inc + exp;
        const incPerc = total === 0 ? 0 : Math.round((inc / total) * 100);
        const expPerc = total === 0 ? 0 : Math.round((exp / total) * 100);

        document.getElementById("chart-income-label").innerText = incPerc + "%";
        document.getElementById("chart-expense-label").innerText =
          expPerc + "%";

        const ctx = document.getElementById("financeChart").getContext("2d");
        if (financeChart) financeChart.destroy();

        financeChart = new Chart(ctx, {
          type: "doughnut",
          data: {
            datasets: [
              {
                data: total === 0 ? [1] : [inc, exp],
                backgroundColor:
                  total === 0 ? ["#f1f5f9"] : ["#10b981", "#f43f5e"],
                borderWidth: 0,
                hoverOffset: 4,
              },
            ],
          },
          options: {
            cutout: "80%",
            plugins: { legend: { display: false } },
            maintainAspectRatio: false,
          },
        });
      }

      document
        .getElementById("finance-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const descInput = document.getElementById("desc");
          const amountInput = document.getElementById("amount");
          const dateInput = document.getElementById("op-date");

          const val = parseFloat(amountInput.value);
          if (isNaN(val) || val <= 0) return;

          const newTransaction = {
            id: Date.now(),
            description: descInput.value,
            amount: val,
            type: currentType,
            date: dateInput.value,
          };

          transactions.push(newTransaction);
          localStorage.setItem("ff_data", JSON.stringify(transactions));

          descInput.value = "";
          amountInput.value = "";
          renderUI();
        });

      function deleteTransaction(id) {
        transactions = transactions.filter((t) => t.id !== id);
        localStorage.setItem("ff_data", JSON.stringify(transactions));
        renderUI();
      }

      function clearHistory() {
        if (confirm("Очистить всю историю операций?")) {
          transactions = [];
          localStorage.removeItem("ff_data");
          renderUI();
        }
      }

      loadProfile();
      renderUI();
    </script>
  </body>
</html>
